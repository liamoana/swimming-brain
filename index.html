<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimming Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    (function() {
      var t = localStorage.getItem('sb-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="app-wrap" id="appWrap">
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span class="sidebar-title">Sources</span>
      </div>

      <button class="add-source-btn" onclick="showUploadModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Add Source
      </button>

      <div class="source-list" id="sourceList"></div>

      <!-- Source Overview (hidden by default) -->
      <div class="source-overview" id="sourceOverview" style="display:none">
        <div class="overview-header">
          <button class="overview-back" onclick="hideSourceOverview()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Sources
          </button>
        </div>
        <div class="overview-body" id="overviewBody"></div>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-brand">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7.5L12 22l-3-5.5C7 14.5 5 12 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          Swimming Brain
        </div>
        <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </aside>

    <!-- RIGHT: Main -->
    <div class="main">
      <div class="topbar">
        <button class="sidebar-toggle topbar-toggle" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <h1 class="topbar-title">Swimming Brain</h1>
        <div class="topbar-actions">
          <button class="clear-btn" onclick="showStudyGuide()" title="Study Guide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Study Guide
          </button>
          <button class="clear-btn" onclick="clearChat()" title="New chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
          </button>
        </div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a7 7 0 0 1 7 7c0 3-2 5.5-4 7.5L12 22l-3-5.5C7 14.5 5 12 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          </div>
          <h2>Swimming Brain</h2>
          <p>Upload your swimming sources — coach notes, PDFs, articles — then ask me anything.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion(this)">What drills improve my backstroke?</button>
            <button class="suggestion" onclick="useSuggestion(this)">What does my coach say about technique?</button>
            <button class="suggestion" onclick="useSuggestion(this)">Explain the high-elbow catch</button>
            <button class="suggestion" onclick="useSuggestion(this)">Summarize my swimming notes</button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="typing" id="typing" style="display:none">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span>Searching sources...</span>
        </div>
      </div>

      <div class="input-area">
        <div class="input-container">
          <div class="input-box">
            <textarea id="inp" rows="1" placeholder="Ask about your swimming sources..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <div class="input-actions">
              <button class="send-btn" id="sendBtn" onclick="send()" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>
              </button>
            </div>
          </div>
          <div class="input-foot">Powered by your sources + smart search</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal" style="display:none" onclick="hideUploadModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>Add Source</h3>
        <button class="modal-close" onclick="hideUploadModal()">&times;</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="file" onclick="switchTab('file')">Upload File</button>
        <button class="modal-tab" data-tab="note" onclick="switchTab('note')">Type a Note</button>
      </div>
      <div class="tab-content" id="tab-file">
        <div class="dropzone" id="dropzone">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>Drag & drop a file here</p>
          <span class="dropzone-hint">PDF or TXT files (max 10 MB)</span>
          <button class="browse-btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
          <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none" onchange="handleFileSelect(this)">
        </div>
        <div class="file-preview" id="filePreview" style="display:none">
          <div class="file-info">
            <span class="file-icon" id="fileIcon">PDF</span>
            <div>
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
            <button class="file-remove" onclick="removeFile()">&times;</button>
          </div>
          <input type="text" class="title-input" id="fileTitle" placeholder="Title (optional)">
        </div>
        <button class="upload-btn" id="uploadBtn" onclick="processFile()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload & Process
        </button>
      </div>
      <div class="tab-content" id="tab-note" style="display:none">
        <input type="text" class="title-input" id="noteTitle" placeholder="Note title (e.g., Coach backstroke tips)">
        <textarea class="note-input" id="noteContent" rows="8" placeholder="Type your notes here..."></textarea>
        <button class="upload-btn" id="noteBtn" onclick="saveNote()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
          Save Note
        </button>
      </div>
    </div>
  </div>

  <!-- Study Guide Modal -->
  <div class="modal-overlay" id="studyGuideModal" style="display:none" onclick="hideStudyGuide(event)">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:640px">
      <div class="modal-header">
        <h3>Study Guide</h3>
        <button class="modal-close" onclick="hideStudyGuide()">&times;</button>
      </div>
      <div class="study-guide-content" id="studyGuideContent"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/brain.js"></script>
  <script src="js/sources.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
